name: Sauce Demo CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  regression:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 25
        uses: actions/setup-java@v3
        with:
          java-version: '24'
          distribution: 'temurin'

      - name: Run Regression Tests
        run: mvn test -Dremote=true -DsuiteXmlFile=regression_test.xml

      - name: Upload Reports and Logs
        uses: actions/upload-artifact@v4
        with:
          name: regression-results
          path: |
            reports/
            logs/

  parallel:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 25
        uses: actions/setup-java@v3
        with:
          java-version: '24'
          distribution: 'temurin'

      - name: Run Parallel Tests
        run: mvn test -Dremote=true -DsuiteXmlFile=parallel_test.xml

      - name: Upload Reports and Logs
        uses: actions/upload-artifact@v4
        with:
          name: parallel-results
          path: |
            reports/
            logs/